[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "retarget_galbot"
version = "0.1.0"
requires-python = ">=3.10"
description = "AoE egocentric MANO reconstruction retargeting to Galbot/Galaxea with MuJoCo visualization"
dependencies = [
    "mujoco>=3.0",
    "numpy>=1.24",
    "scipy",
    "pandas",
    "pyarrow",
    "opencv-python",
    "imageio",
    "imageio-ffmpeg",
    "pin>=3.0",
    "torch",
    "PyYAML",
]

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[tool.setuptools.packages.find]
include = ["retarget_galbot*"]

[tool.setuptools.package-data]
"*" = ["*.xml", "*.urdf", "*.yml", "*.yaml", "*.stl", "*.obj", "*.pkl"]
