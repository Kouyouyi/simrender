[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "retarget-agibot"
version = "0.1.0"
requires-python = ">=3.10"
description = "AgiBot G1 trajectory control and MuJoCo replay tools"
dependencies = [
    "h5py",
    "imageio",
    "imageio-ffmpeg",
    "mujoco>=3.0",
    "numpy>=1.24",
    "opencv-python",
    "scipy",
]

[project.optional-dependencies]
dev = ["pytest", "ruff"]

[tool.setuptools.packages.find]
include = ["retarget_agibot*"]
